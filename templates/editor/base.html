<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or 'Éditeur Patricia Laurent' }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background: #f7f5f1; }
      .editor-shell { max-width: 1280px; margin: 0 auto; }
      .editor-card { background: #fff; border: 1px solid #e7e0d7; border-radius: 18px; box-shadow: 0 10px 30px rgba(40,30,20,0.05); }
      .thumb-mini { width: 72px; height: 72px; object-fit: cover; border-radius: 12px; border: 1px solid #e7e0d7; }
      .form-label { font-weight: 600; }
      .section-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 1rem; }
      .sticky-actions { position: sticky; bottom: 0; background: rgba(247,245,241,.95); padding-top: .75rem; }
      textarea { min-height: 130px; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container-fluid editor-shell px-3 px-lg-4">
        <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">Éditeur Patricia Laurent</a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('site_config') }}">Paramètres du site</a>
          <form method="post" action="{{ url_for('generate_site') }}">
            <button class="btn btn-primary btn-sm" type="submit">Régénérer le site</button>
          </form>
          <a class="btn btn-outline-dark btn-sm" href="{{ url_for('open_site') }}">Ouvrir le site</a>
        </div>
      </div>
    </nav>
    <main class="py-4">
      <div class="container-fluid editor-shell px-3 px-lg-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="mb-3">
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} mb-2">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
