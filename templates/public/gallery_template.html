<!doctype html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site_title }} — {{ ui.gallery_heading }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/styles.css">
  </head>
  <body class="{{ body_class }} gallery-page">
    {% include 'components/header.html' %}
    <main class="py-5">
      <div class="container">
        <div class="page-intro mb-4">
          <h1 class="page-title">{{ ui.gallery_heading }}</h1>
        </div>

        {% include 'components/filters.html' %}

        <div class="results-bar mb-3">
          <span id="resultsCount"></span>
        </div>

        <div id="artworksGrid" class="row g-4"></div>
      </div>
    </main>

    {% include 'components/footer.html' %}

    <script id="gallery-data" type="application/json">{{ gallery_items | tojson }}</script>
    <script>
      window.GALLERY_I18N = {
        no_image: {{ ui.no_image | tojson }},
        view_details: {{ ui.view_details | tojson }},
        results_count_one: {{ ui.results_count_one | tojson }},
        results_count_many: {{ ui.results_count_many | tojson }}
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/gallery.js"></script>
  </body>
</html>
